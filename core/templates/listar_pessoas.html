<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Pessoas</title>
</head>
<body>
    <h1>Pessoas Cadastradas</h1>
    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th colspan="2">Opção 1</th>
        </tr>
        {% for pessoa in pessoas %}
        <tr>
            <td>{{ pessoa.nome }}</td>
            <td>{{ pessoa.email }}</td>
            <td><a href="{% url 'atualizar_pessoa' id=pessoa.id %}">Atualizar</a></td>
            <td><a href="{% url 'deletar_pessoa' id=pessoa.id%}">Deletar</a></td>
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'criar_pessoa' %}">Cadastrar Pessoa</a>
</body>
</html>
