<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Pessoas</title>
</head>
<body>
    <h1>Pessoas Cadastradas</h1>
    <ul>
        {% for pessoa in pessoas %}
            <li>{{ pessoa.nome }} - {{ pessoa.idade }} anos - {{ pessoa.email }} - {{ pessoa.telefone }}</li>
        {% endfor %}
    </ul>
    <a href="{% url 'criar_pessoa' %}">Cadastrar Pessoa</a>
</body>
</html>
